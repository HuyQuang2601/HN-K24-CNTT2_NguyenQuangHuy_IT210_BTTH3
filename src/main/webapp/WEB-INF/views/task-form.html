<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm công việc</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        .form-group { margin-bottom: 14px; max-width: 420px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; }
        input, select { width: 100%; padding: 8px; border: 1px solid #bbb; border-radius: 4px; box-sizing: border-box; }
        .error { color: #d32f2f; margin-top: 4px; font-size: 0.92rem; }
        .actions { margin-top: 16px; }
        button { background: #198754; color: #fff; border: none; padding: 10px 14px; border-radius: 4px; cursor: pointer; }
        a { margin-left: 10px; color: #0b5ed7; text-decoration: none; }
    </style>
</head>
<body>
<h1>Thêm công việc mới</h1>

<form th:action="@{/tasks}" th:object="${taskItem}" method="post">
    <div class="form-group">
        <label for="id">Mã công việc</label>
        <input id="id" type="text" th:field="*{id}" placeholder="Nhập mã công việc (tùy chọn)"/>
        <div class="error" th:if="${#fields.hasErrors('id')}" th:errors="*{id}"></div>
    </div>

    <div class="form-group">
        <label for="title">Tên công việc</label>
        <input id="title" type="text" th:field="*{title}" placeholder="Nhập tên công việc"/>
        <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
    </div>

    <div class="form-group">
        <label for="deadline">Hạn hoàn thành</label>
        <input id="deadline" type="date" th:field="*{deadline}"/>
        <div class="error" th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}"></div>
    </div>

    <div class="form-group">
        <label for="priority">Mức độ ưu tiên</label>
        <select id="priority" th:field="*{priority}">
            <option value="">-- Chọn mức độ --</option>
            <option value="HIGH">HIGH</option>
            <option value="MEDIUM">MEDIUM</option>
            <option value="LOW">LOW</option>
        </select>
        <div class="error" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></div>
    </div>

    <div class="actions">
        <button type="submit">Lưu công việc</button>
        <a th:href="@{/tasks}">Quay lại danh sách</a>
    </div>
</form>
</body>
</html>
