<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách công việc</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        table { border-collapse: collapse; width: 100%; margin-top: 16px; }
        th, td { border: 1px solid #d9d9d9; padding: 10px; text-align: left; }
        th { background: #f2f2f2; }
        a.button { display: inline-block; margin-top: 8px; background: #0b5ed7; color: #fff; padding: 8px 12px; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
<h1>Danh sách công việc</h1>

<a class="button" th:href="@{/tasks/new}">Thêm công việc mới</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Tiêu đề</th>
        <th>Hạn hoàn thành</th>
        <th>Mức độ ưu tiên</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="task : ${tasks}">
        <td th:text="${task.id}"></td>
        <td th:text="${task.title}"></td>
        <td th:text="${task.deadline}"></td>
        <td th:text="${task.priority}"></td>
    </tr>
    <tr th:if="${#lists.isEmpty(tasks)}">
        <td colspan="4">Chưa có công việc nào.</td>
    </tr>
    </tbody>
</table>
</body>
</html>
